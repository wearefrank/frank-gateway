apisix:
  config_center: yaml
  enable_admin: false
  enable_control: false
  node_listen:
    - 9080
  router:
    ssl: radixtree_sni
  ssl:
    enable: true
    listen:
      - port: 9443
    # Needed for clients that do not send SNI consistently.
    fallback_sni: "localhost"
  extra_lua_path: "/usr/local/apisix/custom-plugins/?.lua"                   # Extend lua_package_path to load third-party code.
  extra_lua_cpath: "/usr/local/apisix/custom-plugin-libs/?.so"


plugins:
  - serverless-pre-function
  - proxy-rewrite
  - key-auth
  - consumer-restriction
  - opa
  - auth-zen
 

nginx_config:
  error_log_level: info
  http:
    custom_lua_shared_dict:
      prometheus-cache: 10m

deployment:
  role: data_plane
  role_data_plane:
    config_provider: yaml

