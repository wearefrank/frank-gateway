routes:
  - name: opa-auth-check
    uri: /any/opa-auth
    service_id: 1

services:
  - id: 1
    name: opa-auth-service
    upstream_id: 1
    plugins:
      opa:
        host: http://opa:8181
        policy: apisix/authz/result
        with_body: true
        with_route: true
        send_headers_upstream:
          - x-opa-user

upstreams:
  - id: 1
    name: echo-upstream
    desc: echo API
    type: roundrobin
    nodes:
      "httpbun:80": 1
#END
