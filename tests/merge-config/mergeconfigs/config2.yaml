# cert-auth test APISIX standalone config
# This file is bind-mounted by tests/cert-auth/docker-compose.yaml to:
#   /usr/local/apisix/conf/apisix.yaml
# Keep server/client test certificates here for deterministic local mTLS tests.

routes:
  - name: upstream-test
    id: 2
    uri: /headers
    plugins:
      cert-auth: {}
      consumer-restriction: 
        whitelist: 
          - testuser
    upstream_id: 1
    status: 1

  - name: upstream-test-cn-with-identifier
    id: 3
    uri: /test-cn-with-identifier
    plugins:
      cert-auth: {}
      proxy-rewrite:
        uri: /anything
      consumer-restriction: 
        whitelist: 
          - certuser
    upstream_id: 1
    status: 1


#END