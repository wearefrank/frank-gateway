apisix:
  config_center: yaml
  enable_admin: false
  enable_control: false
  node_listen:
    - 9080
  extra_lua_path: "/usr/local/apisix/custom-plugins/?.lua"
  extra_lua_cpath: "/usr/local/apisix/custom-plugin-libs/?.so"

# Only plugins used by tests/cert-auth/apisix-standalone-config.yaml.
plugins:
  - proxy-rewrite

nginx_config:
  error_log_level: info

deployment:
  role: data_plane
  role_data_plane:
    config_provider: yaml
