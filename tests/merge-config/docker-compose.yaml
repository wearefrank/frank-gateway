name: frank-gateway-merge-config-tests # Name of the parent container
services:
  apisix:
    image: frank-gateway:local
    build:
      context: ../../
      dockerfile: Dockerfile
    restart: always
    volumes:
      - ../../src:/usr/local/apisix/custom-plugins
      - ./conf/config.yaml:/usr/local/apisix/conf/config.yaml
      - ./mergeconfigs:/usr/local/apisix/conf/mergeconfigs
    ports:
      - "9080:9080/tcp"
    networks:
      apisix:
    environment:
      MERGE_CONFIGURATIONS: "true"
      
  httpbun:
    image: sharat87/httpbun:latest
    restart: always
    networks:
      apisix:

networks:
  apisix:
    driver: bridge