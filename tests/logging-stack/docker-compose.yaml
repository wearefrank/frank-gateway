name: frank-gateway-logging-stack-test # Name of the parent container
services:
  apisix:
    image: ghcr.io/wearefrank/frank-gateway:master
    restart: always
    volumes:
      - ../../src:/usr/local/apisix/custom-plugins
      - ./apisix.yaml:/usr/local/apisix/conf/apisix.yaml
      - ../../conf/config.yaml:/usr/local/apisix/conf/config.yaml
    ports:
      - "9180:9180/tcp"
      - "9080:9080/tcp"
      - "9091:9091/tcp"
      - "9092:9092/tcp"
      - "9443:9443/tcp"
    networks:
      apisix:
      
  httpbun:
    image: sharat87/httpbun:8cb6c4f90cf49eb4509e7ae699c27b9f85f383c5
    restart: always
    ports:
      - "80:80/tcp"
    networks:
      apisix:

  prometheus:
    image: prom/prometheus:v2.25.0
    restart: always
    volumes:
      - ../../conf/prometheus_conf/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      apisix:
    
  grafana:
    image: grafana/grafana:latest
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - "../../conf/grafana_conf/provisioning:/etc/grafana/provisioning"
      - "../../conf/grafana_conf/dashboards:/var/lib/grafana/dashboards"
      - "../../conf/grafana_conf/config/grafana.ini:/etc/grafana/grafana.ini"
    networks:
      apisix:

  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

    networks:
      apisix:

  alloy:
    image: grafana/alloy:latest
    restart: always
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "12345:12345"
      - "3101:3101"
    depends_on:
      - loki
      - apisix
    networks:
      apisix:

volumes:
  opa_backup:

networks:
  apisix:
    driver: bridge