consumers:
  - username: certuser
    plugins:
      cert-auth:
        cn: ssl.bult.bz
  - username: testuser
    plugins:
      cert-auth:
        cn: CLIENT


routes:
  - name: gateway-test
    id: 1
    uri: /anything
    plugins:
      cert-auth: {}
      consumer-restriction: 
        whitelist: 
          - certuser
    upstream_id: 1
    status: 1


  - name: upstream-test
    id: 2
    uri: /headers
    plugins:
      cert-auth: {}
      consumer-restriction: 
        whitelist: 
          - testuser
    upstream_id: 1
    status: 1

upstreams:
  - name: httpbun
    id: 1
    nodes:
      "httpbun:80": 1
    type: roundrobin

#END