# Minimal APISIX runtime config for tests/cert-auth.
# This file intentionally enables only what the cert-auth test routes use.

apisix:
  config_center: yaml
  enable_admin: false
  enable_control: false
  node_listen:
    - 9080
  router:
    ssl: radixtree_sni
  ssl:
    enable: true
    listen:
      - port: 9443
    fallback_sni: "localhost"

# Only plugins used in tests/cert-auth/apisix-standalone-config.yaml.
plugins:
  - cert-auth
  - consumer-restriction

deployment:
  role: data_plane
  role_data_plane:
    config_provider: yaml# Minimal APISIX runtime config for tests/cert-auth.
