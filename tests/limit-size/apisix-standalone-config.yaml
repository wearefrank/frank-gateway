host: "host.docker.internal"

routes:
  - name: post-limit-size-test
    id: 1
    uri: /bytes/*
    methods:
      - POST
    plugins:
      limit-size:
        request_limit: 300
        request_limit_unit: bytes
        full_request: false         # count request body
    upstream_id: 1
    status: 1

  - name: get-limit-size-under-test
    id: 2
    uri: /limit-size/under
    methods:
      - GET
    plugins:
      limit-size:
        response_limit: 300
        response_limit_unit: bytes
        full_response: 1            # count response body
      proxy-rewrite:
        uri: /status/200
    upstream_id: 1
    status: 1

  - name: get-limit-size-over-test
    id: 3
    uri: /limit-size/over
    methods:
      - GET
    plugins:
      limit-size:
        response_limit: 300
        response_limit_unit: bytes
        full_response: 1            # count response body
      proxy-rewrite:
        uri: /
    upstream_id: 1
    status: 1
    

upstreams:
  - name: httpbun
    id: 1
    nodes:
      "host.docker.internal:80": 1
    type: roundrobin

#END
